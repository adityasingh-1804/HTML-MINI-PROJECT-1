<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        :root{
            --bg:#f3f6fb;
            --card:#ffffff;
            --accent:#4f46e5;
            --muted:#6b7280;
            --success:#10b981;
            --danger:#ef4444;
            --radius:12px;
            --max-width:420px;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }
        *{box-sizing:border-box}
        html,body{height:100%}
        body{
            margin:0;
            background:linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:32px;
            color:#111827;
        }
        .card{
            width:100%;
            max-width:var(--max-width);
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:0 6px 18px rgba(15,23,42,0.08);
            padding:28px;
        }
        .brand{
            display:flex;
            gap:12px;
            align-items:center;
            margin-bottom:8px;
        }
        .logo{
            width:44px;height:44px;
            border-radius:10px;
            background:linear-gradient(135deg,var(--accent),#06b6d4);
            display:flex;align-items:center;justify-content:center;
            color:white;font-weight:700;font-size:18px;
        }
        h1{margin:4px 0 2px;font-size:20px}
        p.lead{margin:0 0 18px;color:var(--muted);font-size:14px}

        form{display:grid;gap:12px}
        label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
        input[type="text"],input[type="email"],input[type="password"]{
            width:100%;padding:12px 14px;border-radius:10px;border:1px solid #e6e9ef;background:#fff;font-size:14px;
            outline:none;transition:box-shadow .15s,border-color .15s
        }
        input:focus{border-color:var(--accent);box-shadow:0 4px 14px rgba(79,70,229,0.12)}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .actions{display:flex;flex-direction:column;gap:10px;margin-top:6px}
        .btn{
            display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;border:0;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:14px
        }
        .btn.secondary{background:#fff;color:var(--accent);border:1px solid #e6e9ef}
        .helper{font-size:13px;color:var(--muted);text-align:center}
        .small{font-size:12px;color:var(--muted)}
        .divider{height:1px;background:#f1f5f9;margin:12px 0;border-radius:6px}
        .footer{margin-top:12px;text-align:center}

        @media (max-width:520px){
            .row{grid-template-columns:1fr}
            .card{padding:20px}
        }
    </style>
</head>
<body>
    <main class="card" role="main">
        <div class="brand">
            <div class="logo">A</div>
            <div>
                <h1>Create your account</h1>
                <p class="lead">Sign up to access your projects and portfolio.</p>
            </div>
        </div>

        <form action="#" method="post" novalidate>
            <div class="row">
                <div>
                    <label for="first">First name</label>
                    <input id="first" name="first" type="text" placeholder="John" required>
                </div>
                <div>
                    <label for="last">Last name</label>
                    <input id="last" name="last" type="text" placeholder="Doe" required>
                </div>
            </div>

            <div>
                <label for="email">Email address</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>
            </div>

            <div class="row">
                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="At least 8 characters" minlength="8" required>
                </div>
                <div>
                    <label for="confirm">Confirm password</label>
                    <input id="confirm" name="confirm" type="password" placeholder="Repeat password" minlength="8" required>
                </div>
            </div>

            <div class="actions">
                <button class="btn" type="submit">Create account</button>
                <button class="btn secondary" type="button" aria-label="Sign up with GitHub">Sign up with GitHub</button>
            </div>

            <div class="divider" aria-hidden="true"></div>

            <p class="helper small">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
        </form>

        <div class="footer small">Already have an account? <a href="#">Sign in</a></div>
    </main>
</body>
</html>
